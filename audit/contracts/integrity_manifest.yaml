# Atlas STF — Integrity Manifest
# Declarative rules for automated integrity auditing.
# Every critical concept, canonical source, propagation chain,
# fallback threshold, and frontend coverage requirement lives here.

version: "1.0"

# ---------------------------------------------------------------------------
# Critical concepts: canonical sources and allowed helpers
# ---------------------------------------------------------------------------
concepts:
  process_class:
    description: "Classe processual (ADI, RE, ADPF, etc.)"
    canonical_source: "process.jsonl"
    canonical_field: "process_class"
    prohibited_sources:
      - file: "decision_event.jsonl"
        reason: "process_class is sparse/absent in decision events (0% coverage in real data)"
    canonical_helpers:
      - "build_process_class_map"
      - "build_baseline_rates"
      - "build_baseline_rates_stratified"
    prohibited_patterns:
      - pattern: 'event.get("process_class")'
        context: "analytics builders"
        reason: "decision_event does not reliably contain process_class"
        exceptions:
          - "score.py"  # receives enriched events from build_alerts
          - "build_groups.py"  # uses process.jsonl with infer fallback
    severity: critical
    max_fallback_pct: 5.0

  baseline_rate:
    description: "Taxa favorável por classe processual (baseline canônico)"
    canonical_source: "build_baseline_rates (from _outcome_helpers.py)"
    propagation_chain:
      - layer: analytics
        file: "counsel_network.py"
        field: "baseline_rate"
      - layer: schema
        file: "schemas/counsel_network_cluster.schema.json"
        field: "baseline_rate"
      - layer: serving
        file: "serving/_models_analytics.py"
        field: "baseline_rate"
      - layer: loader
        file: "serving/_builder_loaders_analytics_risk.py"
        field: "baseline_rate"
      - layer: api_schema
        file: "api/_schemas_velocity.py"
        field: "baseline_rate"
      - layer: api_service
        file: "api/_counsel_network.py"
        field: "baseline_rate"
      - layer: frontend_type
        file: "web/src/lib/counsel-network-data.ts"
        field: "baseline_rate"
      - layer: frontend_render
        file: "web/src/app/rede-advogados/page.tsx"
        field: "baseline_rate"
    severity: critical
    max_fallback_pct: 10.0

  red_flag:
    description: "Sinalização de anomalia estatística em clusters/matches"
    canonical_helpers:
      - "classify_outcome_raw"
      - "compute_favorable_rate"
      - "lookup_baseline_rate"
    consistency_rules:
      - name: "threshold_constant"
        pattern: "RED_FLAG_DELTA_THRESHOLD"
        required_in:
          - "counsel_network.py"
          - "rapporteur_change.py"
          - "sanction_match.py"
          - "donation_match.py"
          - "corporate_network.py"
      - name: "min_cases_constant"
        pattern: "MIN_CASES_FOR_RED_FLAG|MIN_CLUSTER_CASES_FOR_FLAG"
        min_value: 3
    severity: high

  decision_type:
    description: "Tipo de decisão (monocrática/colegiada)"
    canonical_source: "decision_event.jsonl"
    canonical_field: "decision_type"
    severity: medium

  skipped_parties_over_cap:
    description: "Contagem de partes ignoradas por cap defensivo"
    propagation_chain:
      - layer: analytics
        file: "analytics/firm_cluster.py"
        field: "skipped_parties_over_cap"
      - layer: schema
        file: "schemas/firm_cluster_summary.schema.json"
        field: "skipped_parties_over_cap"
    severity: medium

# ---------------------------------------------------------------------------
# Canonical helper registry: helpers that MUST be used instead of local reimpl
# ---------------------------------------------------------------------------
canonical_helpers:
  compute_favorable_rate:
    module: "analytics._outcome_helpers"
    prohibited_reimplementations:
      - pattern: "favorable.*classifiable.*classify_outcome_raw"
        description: "Local reimplementation of compute_favorable_rate"
        exceptions:
          - "baseline.py"  # uses Beta-Binomial smoothing intentionally
          - "_compute_cluster_favorable_rate"  # operates on process maps, not flat list

  build_process_class_map:
    module: "analytics._outcome_helpers"
    prohibited_reimplementations:
      - pattern: "process_class.*process.jsonl|for.*process.*process_class"
        description: "Local reimplementation of build_process_class_map"
        exceptions:
          - "firm_cluster.py"  # needs additional fields from same read
          - "rapporteur_profile.py"  # needs thematic_key from same read

  build_baseline_rates:
    module: "analytics._outcome_helpers"
    prohibited_reimplementations:
      - pattern: "class_favorable.*class_classifiable"
        description: "Local reimplementation of per-class baseline computation"

# ---------------------------------------------------------------------------
# Frontend↔API coverage requirements
# ---------------------------------------------------------------------------
frontend_coverage:
  groups:
    graph:
      required_coverage: true
      endpoints:
        - path: "/graph/search"
          method: GET
          fetcher: "fetchGraphSearch"
          page: "/investigacao"
        - path: "/graph/nodes/{node_id}"
          method: GET
          fetcher: "fetchGraphNode"
          page: "/investigacao/[entityId]"
          coverage: indirect  # via fetchInvestigationDetail
        - path: "/graph/scores"
          method: GET
          fetcher: "fetchGraphScores"
          page: "/investigacao/scores"
        - path: "/graph/metrics"
          method: GET
          fetcher: "fetchGraphMetrics"
          page: "/investigacao"
        - path: "/graph/neighbors/{node_id}"
          method: GET
          fetcher: "fetchGraphNeighbors"
          page: null
          coverage: fetcher_only
        - path: "/graph/edges/{edge_id}"
          method: GET
          fetcher: null
          coverage: indirect
        - path: "/graph/paths"
          method: GET
          fetcher: null
          coverage: not_required
          reason: "Feature futura — endpoint funcional mas sem UI"
        - path: "/graph/explain/{entity_id}"
          method: GET
          fetcher: null
          coverage: indirect

    investigation:
      required_coverage: true
      endpoints:
        - path: "/investigations/top"
          method: GET
          fetcher: "fetchTopInvestigations"
          page: "/investigacao"
        - path: "/investigations/entity/{entity_id}"
          method: GET
          fetcher: "fetchInvestigationDetail"
          page: "/investigacao/[entityId]"

    review:
      required_coverage: true
      endpoints:
        - path: "/review/queue"
          method: GET
          fetcher: "fetchReviewQueue"
          page: "/revisao"
        - path: "/review/queue/{item_id}"
          method: GET
          fetcher: "fetchReviewItem"
          coverage: fetcher_only
        - path: "/review/decision"
          method: POST
          coverage: not_required
          reason: "Operacional/CLI — requer autenticação, não é frontend de consulta"

# ---------------------------------------------------------------------------
# Fallback thresholds (for audit_fallback_usage.py)
# ---------------------------------------------------------------------------
fallback_thresholds:
  process_class_missing:
    description: "Registros sem process_class resolvido"
    max_pct: 1.0
    measurement: "% de process_ids em decision_event sem correspondência em process.jsonl"

  baseline_rate_fallback:
    description: "Clusters usando DEFAULT_BASELINE_RATE em vez de taxa canônica"
    max_pct: 10.0
    measurement: "% de clusters counsel_network com baseline_rate == DEFAULT_BASELINE_RATE"

  alert_without_process_class:
    description: "Alertas gerados sem process_class enriquecido"
    max_pct: 1.0
    measurement: "% de eventos no build_alerts sem process_class após enriquecimento"
