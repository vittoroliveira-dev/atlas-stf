name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Type check (pyright)
        run: uv run pyright src/

      - name: Test (pytest + coverage)
        run: uv run pytest --tb=short -q --cov=src/atlas_stf --cov-report=term-missing --cov-fail-under=83

      - name: Integrity audit (static — PR gate)
        run: PYTHONPATH=scripts uv run python scripts/audit_integrity.py --quick

      - name: Integrity audit (static — merge gate)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: PYTHONPATH=scripts uv run python scripts/audit_integrity.py --quick

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  publish:
    needs: [lint-and-test, web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detectar tag no commit
        id: tag
        run: |
          TAG=$(git tag --points-at HEAD | grep '^v' | head -1)
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "has_tag=$( [ -n "$TAG" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Instalar uv
        if: steps.tag.outputs.has_tag == 'true'
        uses: astral-sh/setup-uv@v5

      - name: Configurar Python
        if: steps.tag.outputs.has_tag == 'true'
        run: uv python install 3.14

      - name: Build do pacote
        if: steps.tag.outputs.has_tag == 'true'
        run: uv build

      - name: Anexar wheel e sdist ao GitHub Release
        if: steps.tag.outputs.has_tag == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.tag.outputs.version }}" dist/* --clobber

      - name: Login no ghcr.io
        if: steps.tag.outputs.has_tag == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados Docker
        if: steps.tag.outputs.has_tag == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.version }}
            type=raw,value=latest

      - name: Build e push da imagem Docker
        if: steps.tag.outputs.has_tag == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
