<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <defs>
    <linearGradient id="brasil-verde" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#083924"/>
      <stop offset="100%" stop-color="#0f6a42"/>
    </linearGradient>
    <linearGradient id="brasil-azul" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071634"/>
      <stop offset="100%" stop-color="#0b2458"/>
    </linearGradient>
    <linearGradient id="brasil-ouro" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ba8d2a"/>
      <stop offset="100%" stop-color="#e8bf5b"/>
    </linearGradient>
    <linearGradient id="brasil-divider" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f6a42" stop-opacity="0"/>
      <stop offset="25%" stop-color="#0f6a42" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#e8bf5b" stop-opacity="0.9"/>
      <stop offset="75%" stop-color="#0b2458" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0b2458" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Balanca da justica estilizada -->
  <g transform="translate(16, 10)">
    <!-- Pilar central -->
    <rect x="44" y="20" width="4" height="70" rx="2" fill="url(#brasil-azul)"/>
    <!-- Base -->
    <rect x="24" y="88" width="44" height="6" rx="3" fill="url(#brasil-azul)"/>
    <!-- Travessao -->
    <rect x="8" y="18" width="76" height="4" rx="2" fill="url(#brasil-azul)"/>
    <!-- Prato esquerdo -->
    <path d="M8 22 L4 40 Q4 46 16 46 L28 46 Q40 46 40 40 L36 22" stroke="url(#brasil-verde)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Prato direito -->
    <path d="M56 22 L52 40 Q52 46 64 46 L76 46 Q88 46 88 40 L84 22" stroke="url(#brasil-verde)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Pontos de dados no prato esquerdo (ouro) -->
    <circle cx="14" cy="38" r="2.5" fill="#e8bf5b" opacity="0.85"/>
    <circle cx="22" cy="36" r="2.5" fill="#ba8d2a" opacity="0.95"/>
    <circle cx="30" cy="38" r="2.5" fill="#e8bf5b" opacity="0.85"/>
    <!-- Barras de dados no prato direito (ouro) -->
    <rect x="62" y="36" width="3" height="8" rx="1" fill="#e8bf5b" opacity="0.85"/>
    <rect x="67" y="32" width="3" height="12" rx="1" fill="#ba8d2a" opacity="0.95"/>
    <rect x="72" y="34" width="3" height="10" rx="1" fill="#e8bf5b" opacity="0.85"/>
  </g>

  <!-- Texto "Atlas" (serif, ouro escuro) -->
  <text x="130" y="62" font-family="'Cormorant Garamond', Georgia, serif" font-size="44" font-weight="600" fill="#7a5c10" letter-spacing="-1">Atlas</text>

  <!-- Texto "STF" (sans-serif, azul) -->
  <text x="264" y="62" font-family="'Manrope', 'Segoe UI', system-ui, sans-serif" font-size="40" font-weight="600" fill="#0b2458" letter-spacing="-0.5">STF</text>

  <!-- Subtitulo -->
  <text x="130" y="84" font-family="'Manrope', 'Segoe UI', system-ui, sans-serif" font-size="12.5" fill="#52607a" letter-spacing="0.8" font-weight="500">Observatório empírico de padrões decisórios</text>

  <!-- Linha decorativa Brasil (verde → ouro → azul) -->
  <rect x="130" y="93" width="220" height="1.5" rx="0.75" fill="url(#brasil-divider)"/>
</svg>
